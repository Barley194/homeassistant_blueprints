blueprint:
  name: "✨ Dreame Room Cleaning Setup Script"
  description: "✨✨ Configure cleaning details here, then using automation, call this script at the hour and day you want ✨✨"
  domain: script
  source_url: https://raw.githubusercontent.com/Barley194/homeassistant_blueprints/refs/heads/main/Dreame/DreameVacuum_ExposeToAlexa.yaml

  input:
    vacuum_entity:
      name: "🤖 Dreame Robot"
      description: |
        Select your Dreame robot vacuum cleaner.
        
        💡 **Example**: `vacuum.dreame_l10s_ultra` or `vacuum.xiaomi_vacuum_cleaner`
      selector:
        entity:
          domain: vacuum

    cleangenius_select:
      name: "✨ CleanGenius Entity"
      description: |
        Select the entity that controls your robot's **CleanGenius** mode.
        
        💡 **How to find it**: Look among your robot's `select` entities, usually named:
        - `select.robot_name_cleangenius`
        - `select.dreame_cleangenius`
      selector:
        entity:
          domain: select

    cleaning_mode_select:
      name: "🔧 Cleaning Mode Entity"
      description: |
        Select the entity that controls **Cleaning Mode** (separate vacuum/mop).
        
        💡 **How to find it**: Look among your robot's `select` entities, usually:
        - `select.robot_name_cleaning_mode`
        - `select.dreame_cleaning_mode`
      selector:
        entity:
          domain: select

    wetness_level_select:
      name: "💧 Wetness Level Entity"
      description: |
        Select the entity that controls **Wetness Level**.
  
        💡 **How to find it**: Look among your robot's `select` entities, usually:
        - `number.robot_name_wetness_level`
        - `number.dreame_wetness_level`
      selector:
        entity:
          domain: number

    cleaning_route_select:
      name: "Cleaning Route Entity"
      description: |
        Select the entity that controls **Cleaning Route**. Standard or Quick.
  
        💡 **How to find it**: Look among your robot's `select` entities, usually:
        - `select.robot_name_cleaning_route`
        - `select.dreame_cleaning_route`
      selector:
        entity:
          domain: select

    room_id:
      name: "🏠 Room ID"
      description: |
        **Enter the numeric ID** of the room you want to clean.
      default: ""
      selector:
        select:
          multiple: true
          options:
            - label: "1 – Living Room"
              value: "1"
            - label: "2 – Closet"
              value: "2"
            - label: "3 – Corridor"
              value: "3"
            - label: "4 – Office"
              value: "4"
            - label: "5 – Kitchen"
              value: "5"
            - label: "6 – Bathroom"
              value: "6"
            - label: "7 – Primary Bedroom"
              value: "7"

    cleaning_preset:
      name: "🎯 Cleaning Mode"
      description: |
        Choose your desired cleaning mode:
        
        🧹 **Vacuum**: Vacuum only (CleanGenius OFF)
        💧 **Mop**: Mop only (CleanGenius OFF)  
        🧹 **Vacuum** + 💧 **Mop**: Vacuum and mop simultaneously (CleanGenius OFF)  
        💧 **Mop** after 🧹 **Vacuum**: Mop after vacuuming (CleanGenius OFF)  
        ✨ **Cleaning**: Vacuum + Mop simultaneously (CleanGenius ON)  
        🔥 **Deep Cleaning**: Vacuum + Intensive Mop (CleanGenius ON)
      selector:
        select:
          options:
            - label: "🧹 Vacuum"
              value: "Vacuum"
            - label: "💧 Mop" 
              value: "Mop"
            - label: "🧹 Vacuum + 💧 Mop"
              value: "sweeping and mopping"
            - label: "💧 Mop after 🧹 Vacuum"
              value: "mopping after sweeping"
            - label: "✨ CleanGenius Routine Cleaning"
              value: "Cleaning"
            - label: "🔥CleanGenius Deep Cleaning"
              value: "Deep Cleaning"
      default: "sweeping and mopping"

    wetness_level:
      name: "💧 Mopping Wetness Level"
      description: |
        **Enter the number of the wetness level for mopping.**
      selector:
        number:
          min: 1
          max: 32
          mode: slider
      default: 25

    cleaning_route:
      name: "Cleaning Route"
      description: |
        Choose your desired cleaning route:
        Standard or Quick
      selector:
        select:
          options:
            - label: "Standard"
              value: "standard"
            - label: "Quick"
              value: "quick"
      default: "standard"

icon: mdi:robot-vacuum

mode: single

sequence:
  - variables:
      _vacuum: !input vacuum_entity
      _cleangenius_mode: !input cleangenius_select
      _manual_mode: !input cleaning_mode_select
      _roomid: !input room_id
      _wetness_level_select: !input wetness_level_select
      _wetness_level: !input wetness_level
      _cleaning_route_select: !input cleaning_route_select
      _cleaning_route: !input cleaning_route
      _preset_raw: !input cleaning_preset
      _preset: "{{ (_preset_raw or 'sweeping and mopping') | lower }}"

  # Validate room ID
  - condition: template
    value_template: >
      {{ _roomid | select('string') | map('int', -1) | min >= 0 }}
    alias: "Verify room ID validity"

  # Branch based on preset
  - choose:
      # DEEP CLEANING → CleanGenius deep_cleaning
      - conditions:
          - condition: template
            value_template: "{{ _preset == 'deep cleaning' }}"
        sequence:
          - alias: "Set CleanGenius Deep Cleaning"
            service: select.select_option
            target:
              entity_id: "{{ _cleangenius_mode }}"
            data:
              option: deep_cleaning

          - alias: "Wait for CleanGenius mode change"
            wait_template: >-
              {{ states(_cleangenius_mode) in ['deep_cleaning','unknown','unavailable','none'] }}
            timeout: "00:00:10"

          - alias: "Start deep cleaning room"
            service: dreame_vacuum.vacuum_clean_segment
            target:
              entity_id: "{{ _vacuum }}"
            data:
              segments: >
                {{ _roomid | map('int') | list }}

      # CLEANING  → CleanGenius set to Routine Cleaning, then start
      - conditions:
          - condition: template
            value_template: "{{ _preset == 'cleaning' }}"
        sequence:
          - alias: "Set CleanGenius Routine Cleaning"
            service: select.select_option
            target:
              entity_id: "{{ _cleangenius_mode }}"
            data:
              option: routine_cleaning
          - alias: "Start standard cleaning room"
            service: dreame_vacuum.vacuum_clean_segment
            target:
              entity_id: "{{ _vacuum }}"
            data:
              segments: >
                {{ _roomid | map('int') | list }}

      # VACUUM → CleanGenius OFF → cleaning_mode sweeping → start
      - conditions:
          - condition: template
            value_template: "{{ _preset == 'vacuum' }}"
        sequence:
          - alias: "Disable CleanGenius"
            service: select.select_option
            target:
              entity_id: "{{ _cleangenius_mode }}"
            data:
              option: 'off'

          - alias: "Wait for CleanGenius disable"
            wait_template: >-
              {{ states(_cleangenius_mode) in ['off','unknown','unavailable','none'] }}
            timeout: "00:00:10"

          - alias: "Set vacuum mode"
            service: select.select_option
            target:
              entity_id: "{{ _manual_mode }}"
            data:
              option: sweeping

          - delay: "00:00:01"

          - alias: "Set cleaning route"
            service: select.select_option
            target:
              entity_id: "{{ _cleaning_route_select }}"
            data:
              option: "{{ _cleaning_route }}"

          - delay: "00:00:01"

          - alias: "Start vacuum room"
            service: dreame_vacuum.vacuum_clean_segment
            target:
              entity_id: "{{ _vacuum }}"
            data:
              segments: >
                {{ _roomid | map('int') | list }}

      # MOP → CleanGenius OFF → cleaning_mode mopping → start
      - conditions:
          - condition: template
            value_template: "{{ _preset == 'mop' }}"
        sequence:
          - alias: "Disable CleanGenius"
            service: select.select_option
            target:
              entity_id: "{{ _cleangenius_mode }}"
            data:
              option: 'off'

          - alias: "Wait for CleanGenius disable"
            wait_template: >-
              {{ states(_cleangenius_mode) in ['off','unknown','unavailable','none'] }}
            timeout: "00:00:10"

          - alias: "Set mop mode"
            service: select.select_option
            target:
              entity_id: "{{ _manual_mode }}"
            data:
              option: mopping

          - delay: "00:00:01"

          - alias: "Set wetness level"
            service: number.set_value
            target:
              entity_id: "{{ _wetness_level_select }}"
            data:
              value: "{{ _wetness_level }}"

          - delay: "00:00:01"

          - alias: "Set cleaning route"
            service: select.select_option
            target:
              entity_id: "{{ _cleaning_route_select }}"
            data:
              option: "{{ _cleaning_route }}"

          - delay: "00:00:01"

          - alias: "Start mop room"
            service: dreame_vacuum.vacuum_clean_segment
            target:
              entity_id: "{{ _vacuum }}"
            data:
              segments: >
                {{ _roomid | map('int') | list }}

      # Sweeping and Mopping manual → CleanGenius OFF → cleaning_mode mopping → start
      - conditions:
          - condition: template
            value_template: "{{ _preset == 'sweeping and mopping' }}"
        sequence:
          - alias: "Disable CleanGenius"
            service: select.select_option
            target:
              entity_id: "{{ _cleangenius_mode }}"
            data:
              option: 'off'

          - alias: "Wait for CleanGenius disable"
            wait_template: >-
              {{ states(_cleangenius_mode) in ['off','unknown','unavailable','none'] }}
            timeout: "00:00:10"

          - alias: "Set sweeping and mopping mode"
            service: select.select_option
            target:
              entity_id: "{{ _manual_mode }}"
            data:
              option: sweeping_and_mopping

          - delay: "00:00:01"

          - alias: "Set wetness level"
            service: number.set_value
            target:
              entity_id: "{{ _wetness_level_select }}"
            data:
              value: "{{ _wetness_level }}"

          - delay: "00:00:01"

          - alias: "Set cleaning route"
            service: select.select_option
            target:
              entity_id: "{{ _cleaning_route_select }}"
            data:
              option: "{{ _cleaning_route }}"

          - delay: "00:00:01"

          - alias: "Start sweeping and mopping room"
            service: dreame_vacuum.vacuum_clean_segment
            target:
              entity_id: "{{ _vacuum }}"
            data:
              segments: >
                {{ _roomid | map('int') | list }}

      # mopping after sweeping manual → CleanGenius OFF → cleaning_mode mopping after sweeping → start
      - conditions:
          - condition: template
            value_template: "{{ _preset == 'mopping after sweeping' }}"
        sequence:
          - alias: "Disable CleanGenius"
            service: select.select_option
            target:
              entity_id: "{{ _cleangenius_mode }}"
            data:
              option: 'off'

          - alias: "Wait for CleanGenius disable"
            wait_template: >-
              {{ states(_cleangenius_mode) in ['off','unknown','unavailable','none'] }}
            timeout: "00:00:10"

          - alias: "Set sweeping and mopping mode"
            service: select.select_option
            target:
              entity_id: "{{ _manual_mode }}"
            data:
              option: mopping_after_sweeping

          - delay: "00:00:01"

          - alias: "Set wetness level"
            service: number.set_value
            target:
              entity_id: "{{ _wetness_level_select }}"
            data:
              value: "{{ _wetness_level }}"

          - delay: "00:00:01"

          - alias: "Set cleaning route"
            service: select.select_option
            target:
              entity_id: "{{ _cleaning_route_select }}"
            data:
              option: "{{ _cleaning_route }}"

          - delay: "00:00:01"

          - alias: "Start sweeping and mopping room"
            service: dreame_vacuum.vacuum_clean_segment
            target:
              entity_id: "{{ _vacuum }}"
            data:
              segments: >
                {{ _roomid | map('int') | list }}


    default: []